name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false  # 一个平台失败不影响其他平台
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact-name: PictureReader-windows
            exe-path: dist/PictureReader.exe
          - os: macos-latest
            artifact-name: PictureReader-macos
            exe-path: dist/PictureReader
          - os: ubuntu-latest
            artifact-name: PictureReader-linux
            exe-path: dist/PictureReader

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgl1 \
            libegl1 \
            libxkbcommon0 \
            libfontconfig1 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xinput0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libpulse0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>&1
          pip install pyinstaller 2>&1

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --onefile --collect-all PySide6 --name PictureReader main.py 2>&1

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.exe-path }}
          if-no-files-found: error

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: PictureReader-*

      - name: Debug artifact structure
        shell: bash
        run: find . -type f | head -30

      - name: Create release archives
        shell: bash
        run: |
          mkdir -p release
          WEXE=$(find . -name "PictureReader.exe" -type f | head -1)
          LEXE=$(find . -name "PictureReader" -type f | head -3 | tail -1)
          MEXE=$(find . -name "PictureReader" -type f | tail -1)
          echo "Windows: $WEXE"
          echo "Linux: $LEXE"
          echo "macOS: $MEXE"
          cp "$WEXE" PictureReader.exe
          zip release/PictureReader-${{ github.ref_name }}-windows.zip PictureReader.exe
          chmod +x "$LEXE"
          cp "$LEXE" PictureReader
          tar czf release/PictureReader-${{ github.ref_name }}-linux.tar.gz PictureReader
          chmod +x "$MEXE"
          cp "$MEXE" PictureReader
          tar czf release/PictureReader-${{ github.ref_name }}-macos.tar.gz PictureReader

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
